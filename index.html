<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài chính Gia đình</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="top-nav">
            <div class="logo">
                <div class="logo-icon"><i class="ph ph-wallet"></i></div>
                <h1>Tài chính Gia đình</h1>
            </div>
            <div class="nav-actions">
                <button class="icon-btn"><i class="ph ph-bell"></i></button>
                <div class="avatar">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User Avatar">
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar Navigation -->
            <aside class="sidebar">
                <ul class="nav-links">
                    <li class="active" data-page="dashboard">
                        <i class="ph ph-squares-four"></i>
                        <span>Tổng quan</span>
                    </li>
                    <li data-page="transactions">
                        <i class="ph ph-list-dashes"></i>
                        <span>Giao dịch</span>
                    </li>
                    <li data-page="settings">
                        <i class="ph ph-gear"></i>
                        <span>Cài đặt</span>
                    </li>
                </ul>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <!-- Dashboard Page -->
                <section id="page-dashboard" class="page active">
                    <div class="summary-cards">
                        <div class="card balance-card primary-bg">
                            <div class="card-info">
                                <p>Tổng số dư</p>
                                <h2 id="total-balance">0 ₫</h2>
                            </div>
                            <div class="card-icon"><i class="ph ph-wallet"></i></div>
                        </div>
                        <div class="card stat-card">
                            <div class="card-icon income-icon"><i class="ph ph-arrow-up-right"></i></div>
                            <div class="card-info">
                                <p>Thu nhập tháng</p>
                                <h3 id="total-income">0 ₫</h3>
                            </div>
                        </div>
                        <div class="card stat-card">
                            <div class="card-icon expense-icon"><i class="ph ph-arrow-down-right"></i></div>
                            <div class="card-info">
                                <p>Chi tiêu tháng</p>
                                <h3 id="total-expense">0 ₫</h3>
                            </div>
                        </div>
                    </div>

                    <div class="dashboard-grid">
                        <div class="card chart-card">
                            <div class="card-header">
                                <h3>Báo cáo Thu / Chi</h3>
                            </div>
                            <div class="chart-wrapper">
                                <canvas id="financeChart"></canvas>
                            </div>
                        </div>
                        <div class="card budget-card">
                            <div class="card-header">
                                <h3>Phân bổ & Ngân sách</h3>
                            </div>
                            <div class="budget-list" id="budget-list">
                                <!-- Budget items populated by JS -->
                            </div>
                        </div>
                    </div>

                    <div class="card recent-transactions-card">
                        <div class="card-header">
                            <h3>Giao dịch gần đây</h3>
                            <a href="#" class="link-btn" id="view-all-btn">Xem tất cả</a>
                        </div>
                        <div class="transaction-list" id="recent-transactions-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </section>

                <!-- Transactions Page -->
                <section id="page-transactions" class="page">
                    <div class="card full-transactions-card">
                        <div class="card-header">
                            <h3>Lịch sử giao dịch</h3>
                            <div class="header-actions">
                                <select id="filter-type" class="filter-select">
                                    <option value="all">Tất cả</option>
                                    <option value="income">Thu nhập</option>
                                    <option value="expense">Chi tiêu</option>
                                </select>
                                <button class="btn btn-primary" id="btn-add-transaction">
                                    <i class="ph ph-plus"></i> Thêm mới
                                </button>
                            </div>
                        </div>
                        <div class="transaction-list full-list" id="full-transactions-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </section>

                <!-- Settings Page -->
                <section id="page-settings" class="page">
                    <div class="card">
                        <div class="card-header">
                            <h3>Cài đặt</h3>
                        </div>
                        <div class="empty-state">
                            <p>Tính năng đang phát triển</p>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Add Transaction Modal -->
    <div class="modal-overlay" id="transaction-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Thêm Giao Dịch</h2>
                <button class="close-modal"><i class="ph ph-x"></i></button>
            </div>
            <form id="transaction-form">
                <div class="form-group">
                    <label>Loại giao dịch</label>
                    <div class="radio-group">
                        <label class="radio-btn income-radio">
                            <input type="radio" name="type" value="income" required>
                            <span>Thu nhập</span>
                        </label>
                        <label class="radio-btn expense-radio">
                            <input type="radio" name="type" value="expense" checked required>
                            <span>Chi tiêu</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="amount">Số tiền (VNĐ)</label>
                    <input type="number" id="amount" name="amount" min="1" placeholder="Nhập số tiền..." required>
                </div>
                <div class="form-group">
                    <label for="category">Danh mục</label>
                    <select id="category" name="category" required>
                        <option value="Lương">Lương</option>
                        <option value="Mua sắm" selected>Mua sắm</option>
                        <option value="Di chuyển">Di chuyển</option>
                        <option value="Tiện ích">Tiện ích</option>
                        <option value="Giải trí">Giải trí</option>
                        <option value="Ăn uống">Ăn uống</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Ngày thực hiện</label>
                    <input type="datetime-local" id="date" name="date" required>
                </div>
                <!-- Note field hidden to fit cleaner UI, but keeping in logic -->
                <div class="form-group">
                    <label for="note">Tên đối tác / Ghi chú</label>
                    <input type="text" id="note" name="note" placeholder="vd: Siêu thị WinMart...">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Lưu Giao Dịch</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
